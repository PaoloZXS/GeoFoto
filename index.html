<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>GeoFoto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SCHERMATA CLIENTE -->
    <div id="screen-cliente" class="screen active">
        <div class="card">
            <div class="logo">📷</div>
            <h1>GeoFoto</h1>

            <div class="autocomplete">
                <input type="text" id="inputCliente" placeholder="Cerca o inserisci cliente" autocomplete="off">
                <div id="suggestionList" class="suggestion-list" style="display:none"></div>
            </div>

            <button id="btnAvvia" class="btn-primary">Avvia Fotocamera</button>
            <button id="btnArchivio" class="btn-secondary btn-archivio">Archivio Foto</button>
        </div>
    </div>

    <!-- SCHERMATA SELEZIONE CLIENTE ARCHIVIO -->
    <div id="screen-archivio-clienti" class="screen">
        <div class="archivio-container">
            <div class="archivio-header">
                <button id="btnArchivioIndietro" class="btn-back">← Indietro</button>
                <h2>📂 Archivio Foto</h2>
            </div>

            <div id="listaClientiArchivio" class="lista-clienti-archivio"></div>
        </div>
    </div>

    <!-- SCHERMATA GRIGLIA FOTO -->
    <div id="screen-griglia" class="screen">
        <div class="griglia-container">
            <div class="griglia-header">
                <button id="btnGrigliaIndietro" class="btn-back">← Indietro</button>
                <span id="grigliaTitolo" class="griglia-titolo">Cliente</span>
                <span id="grigliaConta" class="griglia-conta"></span>
                <button id="btnEliminaSelezionate" class="btn-elimina-selezionate" style="display:none">🗑️ Elimina</button>
            </div>
            <div id="grigliaFoto" class="griglia-foto"></div>
            <div id="grigliaVuoto" class="griglia-vuoto" style="display:none">
                <span>📭</span>
                <p>Nessuna foto per questo cliente</p>
            </div>
        </div>
    </div>

    <!-- SCHERMATA CAROSELLO -->
    <div id="screen-carosello" class="screen">
        <div class="carosello-container">
            <div class="carosello-header">
                <button id="btnCaroselloIndietro" class="btn-back">← Indietro</button>
                <span id="caroselloTitolo" class="carosello-titolo">Cliente</span>
            </div>
            <div class="carosello-viewport">
                <img id="caroselloImg" src="" alt="Foto">
                <div id="caroselloVuoto" class="carosello-vuoto" style="display:none">
                    <span>📭</span>
                    <p>Nessuna foto per questo cliente</p>
                </div>
            </div>
            <div class="carosello-footer">
                <button id="btnCaroselloPrev" class="btn-nav-carosello">◀</button>
                <span id="caroselloCounter" class="carosello-counter">0 / 0</span>
                <button id="btnCaroselloNext" class="btn-nav-carosello">▶</button>
            </div>
        </div>
    </div>

    <!-- FILE INPUT NASCOSTO (per desktop) -->
    <input type="file" id="fileInput" accept="image/*" capture="environment" multiple style="display:none">

    <!-- SCHERMATA FOTOCAMERA -->
    <div id="screen-camera" class="screen">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none"></canvas>

        <div class="camera-overlay-top">
            <span id="clienteBadge">Cliente: </span>
        </div>

        <div class="camera-overlay-bottom">
            <button id="btnChiudi" class="btn-circle btn-small">✕</button>
            <button id="btnScatta" class="btn-circle btn-large">📷</button>
            <button id="btnFlip" class="btn-circle btn-small">🔄</button>
        </div>

        </div>
    </div>

    <div id="uploadStatus" class="upload-status" style="display:none">
        <div class="upload-panel">
            <div class="progress-bar"><div id="progressFill"></div></div>
            <span id="statusText">Salvataggio in corso...</span>
        </div>
    </div>

    <!-- SCHERMATA ANTEPRIMA -->
    <div id="screen-preview" class="screen">
        <img id="previewImg" alt="Anteprima">
        <div id="multiFileBadge" class="multi-file-badge" style="display:none">0/0</div>
        <div class="preview-actions">
            <button id="btnPreviewIndietro" class="btn-icon-only"><svg viewBox="0 0 24 24" width="40" height="40"><circle cx="12" cy="12" r="10" fill="none" stroke="#4fc3f7" stroke-width="2"/><path d="M14 8l-4 4 4 4" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="icon-label">Indietro</span></button>
            <button id="btnRiscatta" class="btn-icon-only"><svg viewBox="0 0 24 24" width="40" height="40"><circle cx="12" cy="12" r="10" fill="none" stroke="#f44" stroke-width="2"/><path d="M8 8l8 8M16 8l-8 8" fill="none" stroke="#f44" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="icon-label">Annulla</span></button>
            <button id="btnConferma" class="btn-icon-only"><svg viewBox="0 0 24 24" width="40" height="40"><circle cx="12" cy="12" r="10" fill="none" stroke="#4caf50" stroke-width="2"/><path d="M7 13l3 3 7-7" fill="none" stroke="#4caf50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="icon-label">Salva</span></button>
        </div>
    </div>

    <!-- PANNELLO MESSAGGIO -->
    <div id="msgOverlay" class="msg-overlay" style="display:none">
        <div class="msg-panel">
            <div id="msgIcon" class="msg-icon">✓</div>
            <h2 id="msgTitle">Salvato!</h2>
            <p id="msgText">Foto salvata sul server</p>
            <button id="msgBtn" class="btn-primary">OK</button>
        </div>
    </div>

    <!-- CONFERMA ELIMINAZIONE -->
    <div id="confirmOverlay" class="msg-overlay" style="display:none">
        <div class="msg-panel">
            <div class="msg-icon">⚠️</div>
            <h2 id="confirmTitle">Eliminare?</h2>
            <p id="confirmText">Tutte le foto verranno cancellate</p>
            <div class="confirm-actions">
                <button id="confirmAnnulla" class="btn-secondary btn-confirm">Annulla</button>
                <button id="confirmConferma" class="btn-primary btn-confirm">Elimina</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
